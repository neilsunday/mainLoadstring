<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Scripts - Loadstring Gen</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      html, body { overflow-x: hidden; }

      /* ============ SECTION SYSTEM (matches dashboard) ============ */
      .section {
        background: var(--card, #1a1a2e);
        border: 1px solid var(--border, #2a2a3e);
        border-radius: 10px;
        margin-bottom: 20px;
        overflow: hidden;
      }
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 22px;
        background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
        border-bottom: 1px solid var(--border, #2a2a3e);
      }
      .section-header h2 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-header .section-icon {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: var(--primary, #6366f1);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        color: #fff;
        font-weight: bold;
      }
      .section-header .section-count {
        font-size: 0.8rem;
        color: var(--muted, #888);
        font-weight: normal;
        background: var(--bg, #0a0a1a);
        padding: 3px 10px;
        border-radius: 12px;
        border: 1px solid var(--border, #2a2a3e);
      }
      .section-body {
        padding: 22px;
      }

      /* ============ SEARCH BAR ============ */
      .search-wrap {
        position: relative;
      }
      .search-wrap input {
        width: 100%;
        padding: 11px 14px 11px 40px;
        background: var(--bg, #0a0a1a);
        color: var(--text, #fff);
        border: 1px solid var(--border, #2a2a3e);
        border-radius: 6px;
        font-size: 0.95rem;
      }
      .search-wrap::before {
        content: "âŒ•";
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted, #888);
        font-size: 1.1rem;
      }

      /* ============ LOADING / EMPTY ============ */
      .state-panel {
        padding: 48px 24px;
        text-align: center;
      }
      .state-panel .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid var(--border, #2a2a3e);
        border-top-color: var(--primary, #6366f1);
        border-radius: 50%;
        margin: 0 auto 14px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .state-panel .empty-icon {
        font-size: 2.4rem;
        margin-bottom: 10px;
        opacity: 0.5;
      }
      .state-panel p {
        margin: 8px 0 16px;
        color: var(--muted, #888);
      }

      /* Script list rendered by saved.js â€” the JS controls .script-list layout */
      #scriptList {
        padding: 0;
      }
    </style>
  </head>
  <body>
    <nav class="app-nav">
      <div class="brand">Loadstring Gen</div>

      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="saved.html" class="active">Saved Scripts</a>
        <a href="admin.html" id="adminLink" class="hidden">Admin</a>
      </div>

      <div class="user-info">
        <span id="userEmail">Loading...</span>
        <button id="logoutBtn" class="secondary small">Logout</button>
      </div>
    </nav>

    <div class="app-container">
      <div class="page-header">
        <h1>Saved Scripts</h1>
        <p>All your saved scripts. Search, edit, or delete anytime.</p>
      </div>

      <!-- ========== SECTION 1: SEARCH ========== -->
      <div class="section">
        <div class="section-header">
          <h2>
            <span class="section-icon">ðŸ”</span>
            Search
          </h2>
        </div>
        <div class="section-body">
          <div class="search-wrap">
            <input
              type="text"
              id="searchInput"
              placeholder="Search scripts by name..."
            />
          </div>
        </div>
      </div>

      <!-- ========== SECTION 2: SCRIPTS ========== -->
      <div class="section">
        <div class="section-header">
          <h2>
            <span class="section-icon">ðŸ“„</span>
            Your Scripts
          </h2>
          <span id="scriptCount" class="section-count hidden">0</span>
        </div>
        <div class="section-body" style="padding: 0">

          <!-- Loading state -->
          <div id="loadingState" class="state-panel">
            <div class="spinner"></div>
            <p>Loading your scripts...</p>
          </div>

          <!-- Empty state (hidden by default) -->
          <div id="emptyState" class="state-panel hidden">
            <div class="empty-icon">ðŸ“­</div>
            <p>You haven't saved any scripts yet.</p>
            <a href="dashboard.html">
              <button class="primary">Create your first script</button>
            </a>
          </div>

          <!-- Script list (rendered by saved.js) -->
          <div id="scriptList" class="script-list hidden"></div>
        </div>
      </div>
    </div>

    <!-- Edit Modal (hidden by default) -->
    <div id="editModal" class="modal-backdrop hidden">
      <div class="modal">
        <div class="modal-header">
          <h2>Edit Script</h2>
          <button type="button" id="closeModalBtn" class="icon-btn">âœ•</button>
        </div>

        <label for="editName">Script Name</label>
        <input type="text" id="editName" maxlength="100" />

        <label for="editCode" style="margin-top: 14px">
          Lua Code
          <span
            id="editCharCount"
            style="
              float: right;
              color: var(--muted);
              font-weight: normal;
              font-size: 0.82rem;
            "
            >0 characters</span
          >
        </label>
        <textarea id="editCode" spellcheck="false"></textarea>

        <div id="editMessage" class="message hidden"></div>

        <div class="row">
          <button type="button" id="cancelEditBtn" class="secondary">
            Cancel
          </button>
          <button type="button" id="saveEditBtn" class="primary">
            Save Changes
          </button>
        </div>
      </div>
    </div>

    <div
      id="notificationContainer"
      class="notification-container"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="saved.js"></script>
    <script src="anti-tamper.js"></script>
  </body>
</html>
