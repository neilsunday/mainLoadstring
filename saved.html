<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Scripts - Loadstring Gen</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Minimal additions â€” same design language as dashboard-pro.html */

      .section-head {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-bottom: 18px;
        margin-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .section-head .icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.8);
        flex-shrink: 0;
      }
      .section-head .icon svg {
        width: 16px;
        height: 16px;
      }
      .section-head .title-block {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .section-head h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.1px;
      }
      .section-head .sub {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
      }
      .section-head .head-actions {
        margin-left: auto;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .field + .field {
        margin-top: 18px;
      }
      .field > label {
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.85);
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      /* Search input with leading icon */
      .search-wrap {
        position: relative;
      }
      .search-wrap svg {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: rgba(255, 255, 255, 0.4);
        pointer-events: none;
      }
      .search-wrap input {
        padding-left: 44px !important;
        margin: 0;
      }

      /* Count pill */
      .count-pill {
        font-size: 11px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.75);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 3px 10px;
        border-radius: 999px;
      }

      /* Loading / empty state */
      .state {
        padding: 56px 24px;
        text-align: center;
      }
      .state .empty-icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        color: rgba(255, 255, 255, 0.5);
      }
      .state .empty-icon svg { width: 26px; height: 26px; }
      .state p {
        margin: 8px 0 18px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 14px;
      }
      .state .spinner {
        margin: 0 auto 14px;
      }

      /* Script list â€” the JS renders items using existing .script-item styles */
      #scriptList {
        padding: 4px 0;
      }
    </style>
  </head>
  <body>
    <nav class="app-nav">
      <div class="brand">Loadstring Gen</div>

      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="saved.html" class="active">Saved Scripts</a>
        <a href="admin.html" id="adminLink" class="hidden">Admin</a>
      </div>

      <div class="user-info">
        <span id="userEmail">Loading...</span>
        <button id="logoutBtn" class="secondary small">Logout</button>
      </div>
    </nav>

    <div class="app-container">
      <div class="page-header">
        <h1>Saved Scripts</h1>
        <p>All your saved scripts. Search, edit, or delete anytime.</p>
      </div>

      <!-- ============ CARD: SEARCH ============ -->
      <div class="card">
        <div class="section-head">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </span>
          <div class="title-block">
            <h2>Search</h2>
            <span class="sub">Filter scripts by name</span>
          </div>
        </div>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input
            type="text"
            id="searchInput"
            placeholder="Search scripts by name..."
          />
        </div>
      </div>

      <!-- ============ CARD: SCRIPT LIST ============ -->
      <div class="card">
        <div class="section-head">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </span>
          <div class="title-block">
            <h2>Your Scripts</h2>
            <span class="sub">Manage your saved loadstrings</span>
          </div>
          <div class="head-actions">
            <span id="scriptCount" class="count-pill hidden">0</span>
          </div>
        </div>

        <!-- Loading state -->
        <div id="loadingState" class="state">
          <div class="spinner"></div>
          <p>Loading your scripts...</p>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="state hidden">
          <div class="empty-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </div>
          <p>You haven't saved any scripts yet.</p>
          <a href="dashboard.html">
            <button class="primary">Create your first script</button>
          </a>
        </div>

        <!-- Script list (populated by saved.js) -->
        <div id="scriptList" class="script-list hidden"></div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-backdrop hidden">
      <div class="modal">
        <div class="modal-header">
          <h2>Edit Script</h2>
          <button type="button" id="closeModalBtn" class="icon-btn" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="field" style="margin-top: 12px">
          <label for="editName">Script Name</label>
          <input type="text" id="editName" maxlength="100" />
        </div>

        <div class="field">
          <label for="editCode">
            <span>Lua Code</span>
            <span id="editCharCount" class="hint" style="font-size:11px;color:rgba(255,255,255,0.45);font-weight:400">0 characters</span>
          </label>
          <textarea id="editCode" spellcheck="false"></textarea>
        </div>

        <div id="editMessage" class="message hidden" style="margin-top: 12px"></div>

        <div class="row" style="margin-top: 16px">
          <button type="button" id="cancelEditBtn" class="secondary">Cancel</button>
          <button type="button" id="saveEditBtn" class="primary">Save Changes</button>
        </div>
      </div>
    </div>

    <div
      id="notificationContainer"
      class="notification-container"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="saved.js"></script>
    <script src="anti-tamper.js"></script>
  </body>
</html>
