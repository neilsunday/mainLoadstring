<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-left">
          <h2 class="display-title">LOGIN</h2>
          <p class="welcome">
            Hey welcome back!<br />We hope you had a great day
          </p>

          <button
            type="button"
            id="googleSignInBtn"
            class="google-btn"
            aria-label="Continue with Google"
          >
            <span class="g-icon" aria-hidden="true">
              <svg
                width="18"
                height="18"
                viewBox="0 0 533.5 544.3"
                xmlns="http://www.w3.org/2000/svg"
                focusable="false"
              >
                <path
                  fill="#4285F4"
                  d="M533.5 278.4c0-18.5-1.5-36.2-4.3-53.4H272v101h146.9c-6.3 34-25.1 62.7-53.6 82v67h86.5c50.6-46.6 82.7-115.5 82.7-196.6z"
                />
                <path
                  fill="#34A853"
                  d="M272 544.3c72.6 0 133.6-24 178.2-65.2l-86.5-67c-24.1 16.1-54.9 25.6-91.7 25.6-70.5 0-130.2-47.6-151.6-111.6H33.9v69.9C78.4 485.7 168.7 544.3 272 544.3z"
                />
                <path
                  fill="#FBBC05"
                  d="M120.4 326.9c-10.8-32.1-10.8-66.7 0-98.8V158.2H33.9c-39.9 79.6-39.9 173.1 0 252.7l86.5-69.9z"
                />
                <path
                  fill="#EA4335"
                  d="M272 107.7c38.8 0 73.7 13.4 101.3 39l76-76C405.4 24.6 344.4 0 272 0 168.7 0 78.4 58.6 33.9 158.2l86.5 69.9C141.8 155.3 201.5 107.7 272 107.7z"
                />
              </svg>
            </span>
            <span class="g-label">Continue with Google</span>
          </button>

          <p class="signup-hint">
            Not yet a member? <strong id="signupBold">Sign Up</strong>
          </p>
        </div>

        <div class="auth-right" aria-hidden="false">
          <div class="auth-header">
            <h1>Xzero</h1>
            <p class="subtitle">We Secure Your Data</p>
          </div>

          <div class="tabs">
            <button class="tab active" data-tab="login" type="button">
              Login
            </button>
            <button class="tab" data-tab="signup" type="button">Sign Up</button>
          </div>

          <form id="authForm" class="auth-form" autocomplete="on">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />

            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="At least 6 characters"
              minlength="6"
              required
              autocomplete="current-password"
            />

            <div id="confirmGroup" class="hidden">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Retype your password"
                minlength="6"
                autocomplete="new-password"
              />
            </div>

            <button type="submit" id="submitBtn" class="primary full-width">
              Login
            </button>
          </form>

          <div id="message" class="message hidden"></div>

          <p class="auth-footer">
            <span id="switchHint">Dont have an account? </span>
            <a href="#" id="switchLink">Sign up here</a>
          </p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script src="anti-tamper.js"></script>
  </body>
</html>
