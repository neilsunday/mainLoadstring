
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Loadstring Gen</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="app-nav">
      <div class="brand">Dashboard</div>

      <div class="nav-links">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="saved.html">Saved Scripts</a>
        <a href="admin.html" id="adminLink" class="hidden">Admin</a>
      </div>

      <div class="user-info">
        <span id="userEmail">Loading...</span>
        <button id="logoutBtn" class="secondary small">Logout</button>
      </div>
    </nav>

    <div class="app-container">
      <div class="page-header">
        <h1>Loadstring Generator</h1>
        <p>Paste your Lua code below or upload a file.</p>
      </div>

      <div class="card">
        <label for="scriptName">Script Name</label>
        <input
          type="text"
          id="scriptName"
          placeholder="Enter script name: "
          maxlength="100"
        />

        <label for="scriptCode" style="margin-top: 18px">
          Lua Code
          <span
            id="charCount"
            style="
              float: right;
              color: var(--muted);
              font-weight: normal;
              font-size: 0.82rem;
            "
            >0 characters</span
          >
        </label>
        <textarea
          id="scriptCode"
          placeholder="Your Lua code here: "
          spellcheck="false"
        ></textarea>

        <div class="row" style="justify-content: flex-start; margin-top: 12px">
          <input
            type="file"
            id="fileUpload"
            accept=".lua,.txt"
            style="display: none"
          />
          <button type="button" id="uploadBtn" class="secondary small">
            Upload File
          </button>
          <button type="button" id="clearBtn" class="secondary small">
            Clear
          </button>
          <span id="fileName" class="muted" style="margin-left: 8px"></span>
        </div>

        <div style="margin-top: 20px">
          <label for="obfuscationLevel">
            Obfuscation Level
            <span
              class="muted"
              style="font-weight: normal; font-size: 0.82rem; margin-left: 6px"
              >(Luraph-inspired protection)</span
            >
          </label>
          <select
            id="obfuscationLevel"
            style="
              width: 100%;
              padding: 10px 12px;
              margin-top: 6px;
              background: var(--card, #1a1a2e);
              color: var(--text, #fff);
              border: 1px solid var(--border, #2a2a3e);
              border-radius: 6px;
              font-size: 0.95rem;
              cursor: pointer;
            "
          >
            <option value="none">None - save as plain text (no protection)</option>
            <option value="basic">Basic - remove comments and minify</option>
            <option value="medium" selected>Medium - string encryption + number encoding</option>
            <option value="maximum">Maximum - full protection (Luarmor-level)</option>
          </select>
        </div>

        <div class="row" style="margin-top: 18px; gap: 10px">
          <button type="button" id="previewBtn" class="secondary" disabled>
            Preview Output
          </button>
          <button type="button" id="saveBtn" class="primary" disabled>
            Save Script
          </button>
        </div>

        <div id="message" class="message hidden"></div>
      </div>

      <div id="previewCard" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px">
          <h2 style="margin: 0">Obfuscated Preview</h2>
          <button type="button" id="closePreviewBtn" class="secondary small">
            Close
          </button>
        </div>
        <div id="previewStats" class="muted" style="font-size: 0.85rem; margin-bottom: 10px"></div>
        <div class="output-box" style="max-height: 400px; overflow: auto; padding: 12px; background: var(--bg, #0a0a1a); border-radius: 6px; font-family: 'Courier New', monospace; font-size: 0.78rem; line-height: 1.5; white-space: pre-wrap; word-break: break-all">
          <code id="previewOutput"></code>
        </div>
        <div class="row" style="margin-top: 12px; gap: 10px">
          <button type="button" id="copyPreviewBtn" class="secondary small">
            Copy Obfuscated Code
          </button>
        </div>
      </div>

      <div id="resultCard" class="card hidden">
        <h2>Script Saved!</h2>
        <p style="color: var(--text-dim); margin-top: 8px; font-size: 0.9rem">
          Your loadstring:
        </p>
        <div class="output-box" style="margin-top: 12px">
          <code id="loadstringOutput"></code>
        </div>
        <div class="row">
          <button type="button" id="copyBtn" class="secondary small">
            Copy Loadstring
          </button>
          <a href="saved.html" class="muted" style="font-size: 0.88rem">
            View all saved scripts
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="dashboard.js"></script>
    <script src="anti-tamper.js"></script>
  </body>
</html>
